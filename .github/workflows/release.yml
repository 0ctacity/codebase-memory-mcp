name: Release artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version such as v1.2.3
        required: true
        type: string
      draft:
        description: Create a draft GitHub Release
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate version and require a new release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "error: version must look like v1.2.3" >&2
            exit 1
          }
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "error: release $VERSION already exists; refusing to overwrite it" >&2
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$VERSION" >/dev/null 2>&1; then
            echo "error: tag $VERSION already exists; refusing to reuse it" >&2
            exit 1
          fi

  build:
    needs: validate
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ inputs.version }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify artifact set
        working-directory: dist
        run: |
          set -euo pipefail
          for name in \
            codebase-memory-mcp-darwin-amd64.tar.gz \
            codebase-memory-mcp-darwin-arm64.tar.gz \
            codebase-memory-mcp-linux-amd64.tar.gz \
            codebase-memory-mcp-linux-arm64.tar.gz \
            codebase-memory-mcp-linux-amd64-portable.tar.gz \
            codebase-memory-mcp-linux-arm64-portable.tar.gz \
            codebase-memory-mcp-windows-amd64.zip \
            codebase-memory-mcp-windows-arm64.zip \
            codebase-memory-mcp-ui-darwin-amd64.tar.gz \
            codebase-memory-mcp-ui-darwin-arm64.tar.gz \
            codebase-memory-mcp-ui-linux-amd64.tar.gz \
            codebase-memory-mcp-ui-linux-arm64.tar.gz \
            codebase-memory-mcp-ui-linux-amd64-portable.tar.gz \
            codebase-memory-mcp-ui-linux-arm64-portable.tar.gz \
            codebase-memory-mcp-ui-windows-amd64.zip \
            codebase-memory-mcp-ui-windows-arm64.zip; do
            test -s "$name" || { echo "error: missing $name" >&2; exit 1; }
          done
          test "$(find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) | wc -l | tr -d ' ')" = 16
          sha256sum ./*.tar.gz ./*.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: ${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
