name: Build release artifacts

on:
  workflow_call:
    inputs:
      version:
        description: Release version such as v1.2.3
        required: true
        type: string

permissions:
  contents: read

jobs:
  unix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
            cc: gcc
            cxx: g++
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            cc: gcc
            cxx: g++
          - runner: macos-14
            os: darwin
            arch: arm64
            cc: cc
            cxx: c++
          - runner: macos-15-intel
            os: darwin
            arch: amd64
            cc: cc
            cxx: c++
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install Bun
        run: npm install --global bun@1.3.14
      - uses: ./.github/actions/setup-zova

      - name: Build standard Zova-CBM
        env:
          VERSION: ${{ inputs.version }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: scripts/build.sh --version "$VERSION" "CC=$CC" "CXX=$CXX" CBM_WITH_ZOVA=1 "ZOVA_ROOT=$ZOVA_ROOT"
      - name: Verify standard binary
        env:
          VERSION: ${{ inputs.version }}
        run: |
          nm build/c/codebase-memory-mcp > zova-symbols.txt
          grep -q 'zova_fresh_build_begin' zova-symbols.txt
          test "$(build/c/codebase-memory-mcp --version)" = "codebase-memory-mcp ${VERSION#v}"
          if [[ "${{ matrix.os }}" == darwin ]]; then
            codesign --sign - --force build/c/codebase-memory-mcp
          fi
      - name: Archive standard binary
        env:
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
        run: |
          cp LICENSE install.sh build/c/
          scripts/gen-third-party-notices.sh build/c/THIRD_PARTY_NOTICES.md
          tar -czf "codebase-memory-mcp-${OS}-${ARCH}.tar.gz" \
            -C build/c codebase-memory-mcp LICENSE install.sh THIRD_PARTY_NOTICES.md

      - name: Build UI Zova-CBM
        env:
          VERSION: ${{ inputs.version }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: scripts/build.sh --with-ui --version "$VERSION" "CC=$CC" "CXX=$CXX" CBM_WITH_ZOVA=1 "ZOVA_ROOT=$ZOVA_ROOT"
      - name: Verify UI binary
        env:
          VERSION: ${{ inputs.version }}
        run: |
          nm build/c/codebase-memory-mcp > zova-symbols.txt
          grep -q 'zova_fresh_build_begin' zova-symbols.txt
          test "$(build/c/codebase-memory-mcp --version)" = "codebase-memory-mcp ${VERSION#v}"
          if [[ "${{ matrix.os }}" == darwin ]]; then
            codesign --sign - --force build/c/codebase-memory-mcp
          fi
      - name: Archive UI binary
        env:
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
        run: |
          cp LICENSE install.sh build/c/
          scripts/gen-third-party-notices.sh build/c/THIRD_PARTY_NOTICES.md
          tar -czf "codebase-memory-mcp-ui-${OS}-${ARCH}.tar.gz" \
            -C build/c codebase-memory-mcp LICENSE install.sh THIRD_PARTY_NOTICES.md

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: '*.tar.gz'
          if-no-files-found: error

  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: amd64
            msystem: CLANG64
            package_arch: x86_64
            zig_target: x86_64-windows-gnu
          - runner: windows-11-arm
            arch: arm64
            msystem: CLANGARM64
            package_arch: aarch64
            zig_target: aarch64-windows-gnu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          install: >-
            mingw-w64-clang-${{ matrix.package_arch }}-clang
            mingw-w64-clang-${{ matrix.package_arch }}-zlib
            make
            zip
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install Bun
        shell: msys2 {0}
        run: npm install --global bun@1.3.14
      - uses: ./.github/actions/setup-zova
        with:
          target: ${{ matrix.zig_target }}

      - name: Build standard Zova-CBM
        shell: msys2 {0}
        env:
          VERSION: ${{ inputs.version }}
          ZIG_TARGET: ${{ matrix.zig_target }}
        run: scripts/build.sh --version "$VERSION" CC=clang CXX=clang++ CBM_WITH_ZOVA=1 "ZOVA_ROOT=$ZOVA_ROOT" "ZIG_TARGET_FLAGS=-target $ZIG_TARGET"
      - name: Verify and archive standard binary
        shell: msys2 {0}
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ inputs.version }}
        run: |
          BIN=build/c/codebase-memory-mcp.exe
          nm "$BIN" > zova-symbols.txt
          grep -q 'zova_fresh_build_begin' zova-symbols.txt
          test "$("$BIN" --version)" = "codebase-memory-mcp ${VERSION#v}"
          cp "$BIN" codebase-memory-mcp.exe
          scripts/gen-third-party-notices.sh THIRD_PARTY_NOTICES.md
          zip "codebase-memory-mcp-windows-${ARCH}.zip" codebase-memory-mcp.exe LICENSE install.ps1 THIRD_PARTY_NOTICES.md

      - name: Build UI Zova-CBM
        shell: msys2 {0}
        env:
          VERSION: ${{ inputs.version }}
          ZIG_TARGET: ${{ matrix.zig_target }}
        run: scripts/build.sh --with-ui --version "$VERSION" CC=clang CXX=clang++ CBM_WITH_ZOVA=1 "ZOVA_ROOT=$ZOVA_ROOT" "ZIG_TARGET_FLAGS=-target $ZIG_TARGET"
      - name: Verify and archive UI binary
        shell: msys2 {0}
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ inputs.version }}
        run: |
          BIN=build/c/codebase-memory-mcp.exe
          nm "$BIN" > zova-symbols.txt
          grep -q 'zova_fresh_build_begin' zova-symbols.txt
          test "$("$BIN" --version)" = "codebase-memory-mcp ${VERSION#v}"
          cp "$BIN" codebase-memory-mcp.exe
          scripts/gen-third-party-notices.sh THIRD_PARTY_NOTICES.md
          zip "codebase-memory-mcp-ui-windows-${ARCH}.zip" codebase-memory-mcp.exe LICENSE install.ps1 THIRD_PARTY_NOTICES.md

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows-${{ matrix.arch }}
          path: '*.zip'
          if-no-files-found: error

  linux-portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install Bun
        run: npm install --global bun@1.3.14
      - uses: ./.github/actions/setup-zova

      - name: Build standard portable Zova-CBM
        env:
          VERSION: ${{ inputs.version }}
        run: scripts/build.sh --version "$VERSION" CC=gcc CXX=g++ STATIC=1 CBM_WITH_ZOVA=1 "ZOVA_ROOT=$ZOVA_ROOT"
      - name: Verify and archive standard portable binary
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ inputs.version }}
        run: |
          nm build/c/codebase-memory-mcp > zova-symbols.txt
          grep -q 'zova_fresh_build_begin' zova-symbols.txt
          test "$(build/c/codebase-memory-mcp --version)" = "codebase-memory-mcp ${VERSION#v}"
          LDD_OUTPUT=$(ldd build/c/codebase-memory-mcp 2>&1 || true)
          grep -Eq 'not a dynamic executable|statically linked' <<< "$LDD_OUTPUT"
          cp LICENSE install.sh build/c/
          scripts/gen-third-party-notices.sh build/c/THIRD_PARTY_NOTICES.md
          tar -czf "codebase-memory-mcp-linux-${ARCH}-portable.tar.gz" \
            -C build/c codebase-memory-mcp LICENSE install.sh THIRD_PARTY_NOTICES.md

      - name: Build UI portable Zova-CBM
        env:
          VERSION: ${{ inputs.version }}
        run: scripts/build.sh --with-ui --version "$VERSION" CC=gcc CXX=g++ STATIC=1 CBM_WITH_ZOVA=1 "ZOVA_ROOT=$ZOVA_ROOT"
      - name: Verify and archive UI portable binary
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ inputs.version }}
        run: |
          nm build/c/codebase-memory-mcp > zova-symbols.txt
          grep -q 'zova_fresh_build_begin' zova-symbols.txt
          test "$(build/c/codebase-memory-mcp --version)" = "codebase-memory-mcp ${VERSION#v}"
          LDD_OUTPUT=$(ldd build/c/codebase-memory-mcp 2>&1 || true)
          grep -Eq 'not a dynamic executable|statically linked' <<< "$LDD_OUTPUT"
          cp LICENSE install.sh build/c/
          scripts/gen-third-party-notices.sh build/c/THIRD_PARTY_NOTICES.md
          tar -czf "codebase-memory-mcp-ui-linux-${ARCH}-portable.tar.gz" \
            -C build/c codebase-memory-mcp LICENSE install.sh THIRD_PARTY_NOTICES.md

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux-${{ matrix.arch }}-portable
          path: '*-portable.tar.gz'
          if-no-files-found: error
